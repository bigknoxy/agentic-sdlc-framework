name: Security Scan

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/security-scan.yml'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # Job 1: Software Composition Analysis (SCA) - Check dependencies for known vulnerabilities
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Node.js dependency scan
      - name: Check for package.json
        id: check_package
        run: |
          if [ -f "package.json" ]; then
            echo "has_package=true" >> $GITHUB_OUTPUT
          else
            echo "has_package=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Node dependencies (if present)
        if: steps.check_package.outputs.has_package == 'true'
        run: npm ci || npm install

      - name: Run npm audit
        if: steps.check_package.outputs.has_package == 'true'
        run: npm audit --audit-level=moderate || true

      # Python dependency scan
      - name: Check for requirements.txt
        id: check_requirements
        run: |
          if [ -f "requirements.txt" ]; then
            echo "has_requirements=true" >> $GITHUB_OUTPUT
          else
            echo "has_requirements=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Python dependencies (if present)
        if: steps.check_requirements.outputs.has_requirements == 'true'
        run: pip install -r requirements.txt

      - name: Run Safety check
        if: steps.check_requirements.outputs.has_requirements == 'true'
        run: |
          pip install safety
          safety check --json || safety check || true

      # GitHub Dependency Review (built-in SCA)
      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: high
          vulnerability-check: true
          license-check: false

  # Job 2: Static Application Security Testing (SAST) - Analyze code for security issues
  sast-scan:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      # Initialize CodeQL for GitHub's built-in SAST
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
          queries: security-extended,security-and-quality

      # Autobuild attempts to build any compiled languages
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Run CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python,/language:javascript"

      # Additional SAST with Semgrep for broader coverage
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/ci
        env:
          SEMGREP_RULES: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25

  # Job 3: Secret Scanning (comprehensive - beyond pre-commit)
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # TruffleHog - scan entire history for secrets
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch || 'main' }}
          head: HEAD
          extra_args: --debug --only-verified

      # GitHub's built-in secret scanning (if available)
      - name: Check for exposed secrets (basic patterns)
        run: |
          echo "🔍 Scanning for potential secrets in codebase..."
          
          # Patterns to check (excludes examples/templates with placeholders)
          PATTERNS="password|secret|token|key|api_key|apikey"
          EXCLUDES="example|template|placeholder|sample|test|mock|fake|dummy"
          
          # Search for potential secrets (case insensitive)
          FOUND=$(grep -ri "$PATTERNS" --include="*.py" --include="*.js" --include="*.ts" --include="*.json" --include="*.yaml" --include="*.yml" --include="*.md" . 2>/dev/null | grep -vi "$EXCLUDES" | grep -v "node_modules" | grep -v ".git" | head -50 || true)
          
          if [ -n "$FOUND" ]; then
            echo "⚠️ Potential secrets or sensitive patterns found:"
            echo "$FOUND"
            echo ""
            echo "Please review and ensure these are not actual secrets."
            echo "If these are examples/templates, mark them clearly."
          else
            echo "✅ No obvious secrets detected"
          fi

  # Job 4: Infrastructure as Code (IaC) scanning
  iac-scan:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Check for IaC files and scan if present
      - name: Check for IaC files
        id: check_iac
        run: |
          if [ -f "Dockerfile" ] || [ -f "docker-compose.yml" ] || [ -f "docker-compose.yaml" ]; then
            echo "has_docker=true" >> $GITHUB_OUTPUT
          fi
          if [ -d "terraform" ] || [ -f "*.tf" ]; then
            echo "has_terraform=true" >> $GITHUB_OUTPUT
          fi
          if [ -d "kubernetes" ] || [ -d "k8s" ] || [ -f "*.yaml" ]; then
            echo "has_k8s=true" >> $GITHUB_OUTPUT
          fi

      # Scan Dockerfile if present
      - name: Scan Dockerfile with Hadolint
        if: steps.check_iac.outputs.has_docker == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./Dockerfile
          verbose: true

      # Additional container security with Trivy
      - name: Run Trivy vulnerability scanner
        if: steps.check_iac.outputs.has_docker == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

  # Job 5: Compliance and Policy Check
  compliance-check:
    name: Compliance Validation
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan, secret-scan]
    if: always()  # Run even if previous jobs fail
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate framework compliance
        run: |
          echo "🔍 Validating Agentic SDLC Framework compliance..."
          
          # Check for required security files
          REQUIRED_FILES=(
            "LICENSE"
            "CONTRIBUTING.md"
            ".gitignore"
          )
          
          MISSING=()
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              MISSING+=("$file")
            fi
          done
          
          if [ ${#MISSING[@]} -eq 0 ]; then
            echo "✅ All required files present"
          else
            echo "⚠️ Missing files: ${MISSING[*]}"
          fi
          
          # Check for security documentation
          if [ -f "docs/security-guardrails.md" ]; then
            echo "✅ Security guardrails documentation found"
          else
            echo "ℹ️ Consider adding docs/security-guardrails.md"
          fi
          
          echo ""
          echo "📊 Security Scan Summary"
          echo "========================"
          echo "Dependency Scan: ${{ needs.dependency-scan.result }}"
          echo "SAST Scan: ${{ needs.sast-scan.result }}"
          echo "Secret Scan: ${{ needs.secret-scan.result }}"

  # Notification job (optional - for enterprise environments)
  notify:
    name: Security Scan Notification
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan, secret-scan, compliance-check]
    if: always() && (needs.dependency-scan.result == 'failure' || needs.sast-scan.result == 'failure' || needs.secret-scan.result == 'failure')
    steps:
      - name: Security scan failed notification
        run: |
          echo "🚨 Security scan detected issues"
          echo "Please review the security scan results above"
          echo "For regulated environments, failures must be reviewed by security team"
