name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint Markdown
        run: markdownlint '**/*.md' --ignore node_modules --ignore CHANGELOG.md || true

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --timeout 30 --max-concurrency 1 --exclude-all-private .
        continue-on-error: true

  validate-specs:
    name: Validate Specs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate spec templates
        run: |
          # Check if agent-ready-spec template exists and is valid
          if [ -f "templates/agent-ready-spec.md" ]; then
            echo "✅ Agent-ready spec template found"
            # Check for required sections
            for section in "Context" "Goal State" "Acceptance Criteria" "Edge Cases"; do
              if grep -q "$section" templates/agent-ready-spec.md; then
                echo "✅ Section '$section' found"
              else
                echo "❌ Section '$section' missing"
                exit 1
              fi
            done
          else
            echo "❌ Agent-ready spec template not found"
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Detection (PR)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: Secret Detection (Push)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --debug --only-verified

      - name: Secret Detection (Fallback)
        if: failure()
        run: |
          echo "⚠️ TruffleHog scan encountered an issue, running basic secret check"
          # Basic check for common secret patterns
          if grep -r -i "password\|secret\|token\|key" --include="*.md" --include="*.txt" --include="*.yaml" --include="*.yml" . | grep -v "example\|template\|placeholder" | head -20; then
            echo "⚠️ Potential secrets found - please review"
          fi
          echo "✅ Basic secret check complete"

      - name: Check for sensitive files
        run: |
          # Check for files that shouldn't be committed
          SENSITIVE=$(find . -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name ".env" 2>/dev/null | grep -v node_modules | head -20)
          if [ -n "$SENSITIVE" ]; then
            echo "❌ Sensitive files found:"
            echo "$SENSITIVE"
            exit 1
          fi
          echo "✅ No sensitive files found"

  structure:
    name: Validate Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check directory structure
        run: |
          required_dirs=("docs" "templates" "examples" "tools")
          for dir in "${required_dirs[@]}"; do
            if [ -d "$dir" ]; then
              echo "✅ Directory '$dir' exists"
            else
              echo "⚠️ Directory '$dir' missing (optional)"
            fi
          done

      - name: Check required files
        run: |
          required_files=("README.md" "LICENSE" "CONTRIBUTING.md")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ File '$file' exists"
            else
              echo "❌ File '$file' missing"
              exit 1
            fi
          done

  test:
    name: Test Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test guardrail scripts (if exist)
        run: |
          if [ -d "tools/guardrail-scripts" ]; then
            for script in tools/guardrail-scripts/*.py; do
              if [ -f "$script" ]; then
                echo "Testing $script"
                python3 -m py_compile "$script" || exit 1
                echo "✅ $script compiles successfully"
              fi
            done
          else
            echo "ℹ️ No guardrail scripts to test yet"
          fi
